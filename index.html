<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Ki Rush is an anime-inspired browser tower defense game built for GitHub and Vercel."
    />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%2316120f'/%3E%3Ccircle cx='32' cy='32' r='22' fill='%236be6ff'/%3E%3Cpath d='M33 7 18 34h12l-3 23 19-31H33z' fill='%23ffd166'/%3E%3C/svg%3E"
    />
    <title>Ki Rush</title>
  </head>
  <body>
    <div id="app">
      <main class="shell">
        <section class="game-stage" aria-label="Ki Rush game">
          <canvas id="game" width="1280" height="720"></canvas>
          <div class="hud top-left">
            <strong>Ki Rush</strong>
            <span id="wave">Wave 1</span>
            <span id="lives">Lives 20</span>
            <span id="ki">Coins 280</span>
          </div>
          <div class="hud top-right">
            <button id="start-wave" type="button">Start Wave</button>
            <button id="pause" type="button">Pause</button>
          </div>
          <div class="hud bottom-left" id="status">Click a glowing pad to build an energy tower.</div>
          <div class="hud detail-panel" id="tower-details"></div>
          <div class="hud bottom-right">
            <button class="tower-choice active" type="button" data-tower="pulse">Blue 60</button>
            <button class="tower-choice" type="button" data-tower="nova">Gold 95</button>
            <button class="tower-choice" type="button" data-tower="mystic">Mystic 85</button>
            <button class="tower-choice" type="button" data-tower="speed">Speed 55</button>
            <button class="tower-choice" type="button" data-tower="guardian">Guard 80</button>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
