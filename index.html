<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Ki Rush is an anime-inspired browser tower defense game built for GitHub and Vercel."
    />
    <title>Ki Rush</title>
  </head>
  <body>
    <div id="app">
      <main class="shell">
        <section class="game-stage" aria-label="Ki Rush game">
          <canvas id="game" width="1280" height="720"></canvas>
          <div class="hud top-left">
            <strong>Ki Rush</strong>
            <span id="wave">Wave 1</span>
            <span id="lives">Lives 20</span>
            <span id="ki">Ki 140</span>
          </div>
          <div class="hud top-right">
            <button id="start-wave" type="button">Start Wave</button>
            <button id="pause" type="button">Pause</button>
          </div>
          <div class="hud bottom-left" id="status">Click a glowing pad to build an energy tower.</div>
          <div class="hud bottom-right">
            <button class="tower-choice active" type="button" data-tower="pulse">Pulse 60</button>
            <button class="tower-choice" type="button" data-tower="nova">Nova 95</button>
            <button class="tower-choice" type="button" data-tower="slow">Frost 75</button>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
